name: legal_assistant
description: A legal companion app with document scanning, case notes, calendar, and reminders.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  table_calendar: ^3.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  camera: ^0.10.6
  image_picker: ^1.1.2
  image: ^4.5.0
  pdf: ^3.11.1
  path_provider: ^2.1.5
  printing: ^5.14.2
  share_plus: ^10.1.4
  cupertino_icons: ^1.0.8
  flutter_staggered_animations: ^1.1.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
