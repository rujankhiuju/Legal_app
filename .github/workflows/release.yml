# =============================================================================
# GitHub Actions ā€” Automated APK Release
# =============================================================================
# Trigger: push a tag matching v* (e.g. v1.0.0, v2.1.3)
# What it does:
#   1. Checks out code
#   2. Sets up Java 17 + Flutter stable
#   3. Builds split-per-abi APKs + a universal fat APK
#   4. Signs all APKs using a keystore from GitHub Secrets
#   5. Creates a GitHub Release with auto-generated changelog
#   6. Attaches all APK files as release assets
# =============================================================================

name: Build & Release APK

on:
  push:
    tags:
      - 'v*'   # e.g. v1.0.0, v2.1.3

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      # 1 ā”€ā”€ Checkout code with full history for changelog generation
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # fetch all tags + history for git log below

      # 2 ā”€ā”€ Set up Java 17 (required by Flutter's Gradle)
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3 ā”€ā”€ Set up Flutter 3.22.2 (stable, pinned to match build.yml)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version: '3.22.2'
          cache: true

      # 4 ā”€ā”€ Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 5 ā”€ā”€ Run tests (skip gracefully if no test files exist)
      - name: Run Tests
        run: flutter test --no-pub || echo "No tests found ā€” skipping"

      # 6 ā”€ā”€ Decode the keystore from secrets
      #     Store your keystore as a base64-encoded secret named KEYSTORE_BASE64
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # 7 ā”€ā”€ Create local.properties for version info
      #     The flutter.sdk property is set by the flutter-action step above.
      - name: Create local.properties
        run: |
          echo "flutter.versionCode=${{ github.run_number }}" >> android/local.properties
          echo "flutter.versionName=${{ github.ref_name }}" >> android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          # Flutter 3.22 sets compileSdk to 34 by default; keep it stable
          echo "flutter.compileSdk=34" >> android/local.properties
          echo "flutter.minSdk=24" >> android/local.properties
          echo "flutter.targetSdk=34" >> android/local.properties

      # 8 ā”€ā”€ Create key.properties for signing
      #     The storeFile path is relative to the android/ directory.
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../keystore.jks
          EOF

      # 9 ā”€ā”€ Build split-per-abi APKs (arm64-v8a, armeabi-v7a, x86_64)
      #     These are smaller and are preferred for Play Store distribution.
      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      # 10 ā”€ā”€ Build universal (fat) APK that works on all architectures
      - name: Build Fat APK
        run: flutter build apk --release

      # 11 ā”€ā”€ Generate release notes from commits since the last tag
      - name: Generate Release Notes
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            NOTES="## Initial Release\n\nFirst release of Legal Assistant."
          else
            NOTES=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s" --no-merges)
            NOTES="## Changelog since $PREVIOUS_TAG\n\n$NOTES"
          fi
          # Escape newlines for GitHub Actions output
          NOTES="${NOTES//'%'/'%25'}"
          NOTES="${NOTES//$'\n'/'%0A'}"
          NOTES="${NOTES//$'\r'/'%0D'}"
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"

      # 12 ā”€ā”€ Create GitHub Release and upload assets
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Legal Assistant ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
          make_latest: true
          files: |
            build/app/outputs/flutter-apk/app-*-release.apk
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
